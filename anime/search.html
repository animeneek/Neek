<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Neek — Anime Search (Unlimited)</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --accent:#ff4444;
      --bg:#0b0b0b;
    }
    body { background:var(--bg); color:#fff; }
    a { color:#fff; text-decoration:none !important; }
    a:hover { color:var(--accent); text-decoration:none !important; }
    .chip {
      border:1px solid #333;
      border-radius:9999px;
      padding:4px 10px;
      font-size:0.875rem;
      cursor:pointer;
      transition:all 0.2s;
      white-space:nowrap;
    }
    .chip.active { background:var(--accent); border-color:var(--accent); color:#fff; }
    .star { color:var(--accent); }
    input, select {
      outline: none !important;
      box-shadow: none !important;
      border: 1px solid #333;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 2px var(--accent) !important;
      outline: none !important;
    }
    /* Scroll to top button */
    #scrollTop {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--accent);
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 1000;
    }
    #scrollTop.visible { opacity: 1; }
    #scrollTop:hover { transform: scale(1.1); }
    .result-count-badge {
      background: var(--accent);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.875rem;
      display: inline-block;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col bg-[--bg] text-white">

  <!-- Header -->
  <div id="header"></div>

  <main class="flex-1 max-w-7xl w-full mx-auto px-3 sm:px-6 py-6 md:pt-28 pb-24 flex flex-col md:flex-row gap-6">

    <!-- Sidebar filters -->
    <aside class="w-full md:w-64 shrink-0 bg-[#111] p-4 rounded-xl h-fit mb-6 md:mb-0">
      <!-- Search -->
      <div class="mb-6">
        <input id="searchInput" type="text" placeholder="Search Anime... (blank = all anime)" 
          class="w-full bg-[#1a1a1a] border border-gray-700 rounded-xl px-4 py-2">
        <button id="searchBtn" class="mt-2 w-full bg-[--accent] py-2 rounded-xl font-semibold hover:opacity-90 transition">
          <i class="fa fa-search"></i> Search
        </button>
      </div>

      <!-- Format filter -->
      <div class="mb-6">
        <h3 class="font-semibold mb-2">Format</h3>
        <div id="formatFilters" class="flex gap-2 flex-wrap">
          <span class="chip active" data-format="all">All</span>
          <span class="chip" data-format="TV">TV</span>
          <span class="chip" data-format="MOVIE">Movie</span>
          <span class="chip" data-format="OVA">OVA</span>
          <span class="chip" data-format="ONA">ONA</span>
          <span class="chip" data-format="SPECIAL">Special</span>
        </div>
      </div>

      <!-- Genres -->
      <div class="mb-6">
        <h3 class="font-semibold mb-2">Genres</h3>
        <div id="genreFilters" class="flex gap-2 flex-wrap"></div>
      </div>

      <!-- Year & Sort -->
      <div class="mb-6">
        <h3 class="font-semibold mb-2">Year</h3>
        <input id="yearFilter" type="number" placeholder="e.g. 2022" 
          class="w-full bg-[#1a1a1a] border border-gray-700 rounded-xl px-3 py-2">
      </div>
      <div class="mb-6">
        <h3 class="font-semibold mb-2">Sort By</h3>
        <select id="sortFilter" 
          class="w-full bg-[#1a1a1a] border border-gray-700 rounded-xl px-3 py-2">
          <option value="date">Release Date (Newest)</option>
          <option value="rating">Rating (Highest)</option>
          <option value="title">Title (A–Z)</option>
        </select>
      </div>

      <!-- Adult toggle -->
      <div class="mb-6">
        <label class="flex items-center gap-2 cursor-pointer">
          <input id="adultToggle" type="checkbox" class="w-4 h-4 accent-[--accent]">
          <span>Include Adult</span>
        </label>
      </div>
      
      <!-- Fetch limit indicator -->
      <div class="text-xs text-gray-500 mt-4 pt-4 border-t border-gray-800">
        <i class="fa fa-database"></i> Fetching up to <span id="fetchLimitDisplay">1000</span> anime for complete filtering
      </div>
    </aside>

    <!-- Results section -->
    <section class="flex-1">
      <div class="flex justify-between items-center mb-6 flex-wrap gap-3">
        <h2 class="text-2xl font-bold">Results</h2>
        <div id="resultStats" class="result-count-badge bg-gray-800 text-white">
          <span id="resultCount">0</span> anime loaded
        </div>
      </div>
      
      <div id="resultsGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4"></div>

      <!-- Loading indicator -->
      <div id="loadingSpinner" class="flex justify-center items-center py-12" style="display: none;">
        <i class="fa-solid fa-spinner fa-spin text-3xl text-[--accent]"></i>
        <span class="ml-3 text-gray-400">Fetching anime pages... This ensures you don't miss any!</span>
      </div>
      
      <!-- Progress bar for fetching -->
      <div id="fetchProgress" class="mt-4" style="display: none;">
        <div class="bg-gray-800 rounded-full h-2 overflow-hidden">
          <div id="progressBar" class="bg-[--accent] h-2 transition-all duration-300" style="width: 0%"></div>
        </div>
        <p id="progressText" class="text-xs text-gray-500 text-center mt-2"></p>
      </div>

      <!-- Pagination -->
      <div class="flex justify-center items-center gap-4 mt-8" id="pagination" style="display:none;">
        <button id="prevPage" class="px-4 py-2 bg-[#1a1a1a] rounded-lg hover:bg-[--accent] hover:text-white disabled:opacity-40">Prev</button>
        <span id="pageInfo" class="text-sm text-gray-400"></span>
        <button id="nextPage" class="px-4 py-2 bg-[#1a1a1a] rounded-lg hover:bg-[--accent] hover:text-white disabled:opacity-40">Next</button>
      </div>
    </section>
  </main>
  
  <!-- Scroll to top button -->
  <div id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
    <i class="fas fa-arrow-up"></i>
  </div>

  <script>
    const FALLBACK_POSTER = "https://github.com/animeneek/Neek/blob/main/assets/images/Poster%20404%20Error.png?raw=true";
    
    // CONFIGURATION - FETCH UP TO 1000 ANIME FOR COMPLETE FILTERING
    const MAX_PAGES_TO_FETCH = 20; // 20 pages × 50 per page = 1000 anime max
    const ITEMS_PER_PAGE_API = 50;
    
    let allResults = [];
    let filteredResults = [];
    let currentPage = 1;
    const pageSizeDisplay = 20;
    let activeGenres = [];
    let activeFormat = "all";
    let currentQuery = "";
    let includeAdult = false;
    let isLoading = false;
    let currentFetchController = null; // To cancel ongoing fetches if needed
    
    // Load header/footer
    Promise.all([
      fetch("header.html").then(r=>r.text()),
      fetch("footer.html").then(r=>r.text())
    ]).then(([h,f])=>{
      document.getElementById("header").innerHTML=h;
      document.getElementById("footer").innerHTML=f;
    }).catch(e=>console.warn("Header/footer loading issue:", e));
    
    // Genre list
    const GENRES = [
      "Action","Adventure","Comedy","Drama","Fantasy","Horror","Mecha","Music",
      "Mystery","Romance","Sci-Fi","Slice of Life","Sports","Supernatural","Thriller",
      "Ecchi","Erotica","Hentai"
    ];
    document.getElementById("genreFilters").innerHTML = GENRES.map(g=>`<span class="chip" data-genre="${g}">${g}</span>`).join("");
    document.querySelectorAll("#genreFilters .chip").forEach(chip=>{
      chip.addEventListener("click",()=>{
        chip.classList.toggle("active");
        activeGenres = Array.from(document.querySelectorAll("#genreFilters .chip.active")).map(c=>c.dataset.genre);
        applyFilters(1);
      });
    });
    
    // Fetch ALL pages (unlimited until max pages)
    async function fetchAllAnimePages(searchTerm, isAdult, maxPages = MAX_PAGES_TO_FETCH) {
      let allMedia = [];
      let currentPageNum = 1;
      let hasNextPage = true;
      const useEmptySearch = !searchTerm || searchTerm.trim() === "";
      
      const progressDiv = document.getElementById("fetchProgress");
      const progressBar = document.getElementById("progressBar");
      const progressText = document.getElementById("progressText");
      
      progressDiv.style.display = "block";
      
      while (hasNextPage && currentPageNum <= maxPages) {
        try {
          // Update progress
          const percent = (currentPageNum / maxPages) * 100;
          progressBar.style.width = `${percent}%`;
          progressText.innerText = `Fetching page ${currentPageNum}/${maxPages}... (${allMedia.length} anime loaded so far)`;
          
          let queryStr, variables;
          
          if (useEmptySearch) {
            // For blank search: fetch by popularity to get diverse results
            queryStr = `
              query ($page: Int, $perPage: Int, $isAdult: Boolean) {
                Page(page: $page, perPage: $perPage) {
                  pageInfo { hasNextPage }
                  media(type: ANIME, isAdult: $isAdult, sort: [POPULARITY_DESC, TRENDING_DESC]) {
                    id
                    title { romaji english }
                    coverImage { large }
                    format
                    genres
                    startDate { year }
                    status
                    episodes
                    averageScore
                  }
                }
              }
            `;
            variables = { page: currentPageNum, perPage: ITEMS_PER_PAGE_API, isAdult };
          } else {
            // Search with keyword - keep fetching all matching results
            queryStr = `
              query ($search: String, $page: Int, $perPage: Int, $isAdult: Boolean) {
                Page(page: $page, perPage: $perPage) {
                  pageInfo { hasNextPage }
                  media(search: $search, type: ANIME, isAdult: $isAdult) {
                    id
                    title { romaji english }
                    coverImage { large }
                    format
                    genres
                    startDate { year }
                    status
                    episodes
                    averageScore
                  }
                }
              }
            `;
            variables = { search: searchTerm, page: currentPageNum, perPage: ITEMS_PER_PAGE_API, isAdult };
          }
          
          const res = await fetch("https://graphql.anilist.co", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query: queryStr, variables })
          });
          
          if (!res.ok) {
            console.warn(`API error on page ${currentPageNum}: ${res.status}`);
            break;
          }
          
          const data = await res.json();
          if (data.errors) {
            console.warn("GraphQL errors:", data.errors);
            break;
          }
          
          const media = data.data?.Page?.media || [];
          if (media.length > 0) {
            allMedia = [...allMedia, ...media];
          }
          
          hasNextPage = data.data?.Page?.pageInfo?.hasNextPage || false;
          currentPageNum++;
          
          // Small delay to avoid rate limiting
          await new Promise(resolve => setTimeout(resolve, 100));
          
        } catch (err) {
          console.error(`Error fetching page ${currentPageNum}:`, err);
          break;
        }
      }
      
      progressDiv.style.display = "none";
      
      // Remove duplicates by ID
      const unique = [];
      const seenIds = new Set();
      for (const item of allMedia) {
        if (!seenIds.has(item.id)) {
          seenIds.add(item.id);
          unique.push(item);
        }
      }
      
      return unique;
    }
    
    // Main fetch function
    async function fetchAllResults(query) {
      if (isLoading) return;
      isLoading = true;
      
      // Cancel previous fetch if any
      if (currentFetchController) {
        // Note: Can't truly cancel fetch, but we can ignore results
      }
      
      const spinner = document.getElementById("loadingSpinner");
      const grid = document.getElementById("resultsGrid");
      if (spinner) spinner.style.display = "flex";
      if (grid) grid.innerHTML = '<div class="col-span-full text-center text-gray-400 py-10">Loading up to 1000 anime for complete filtering...</div>';
      
      try {
        const searchTerm = (query && query.trim() !== "") ? query.trim() : "";
        
        // Fetch normal results (unlimited pages)
        let normalResults = await fetchAllAnimePages(searchTerm, false, MAX_PAGES_TO_FETCH);
        
        // Fetch adult results if enabled
        let adultResults = [];
        if (includeAdult && (!searchTerm || searchTerm.length > 0)) {
          adultResults = await fetchAllAnimePages(searchTerm, true, Math.min(MAX_PAGES_TO_FETCH, 10));
        }
        
        // Combine and deduplicate
        const combined = [...normalResults];
        const existingIds = new Set(normalResults.map(a => a.id));
        for (const adult of adultResults) {
          if (!existingIds.has(adult.id)) {
            combined.push(adult);
            existingIds.add(adult.id);
          }
        }
        
        allResults = combined;
        
        // Update stats display
        document.getElementById("resultCount").innerText = allResults.length;
        document.getElementById("fetchLimitDisplay").innerText = MAX_PAGES_TO_FETCH * ITEMS_PER_PAGE_API;
        
        if (allResults.length === 0) {
          grid.innerHTML = '<div class="col-span-full text-center text-gray-400 py-10">No anime found. Try a different search term or adjust filters.</div>';
          document.getElementById("pagination").style.display = "none";
          return;
        }
        
        applyFilters(1);
        
      } catch (err) {
        console.error("Failed to fetch anime:", err);
        if (grid) grid.innerHTML = '<div class="col-span-full text-center text-red-500 py-10">Failed to load anime. Please try again.</div>';
      } finally {
        if (spinner) spinner.style.display = "none";
        isLoading = false;
      }
    }
    
    // Apply all filters
    function applyFilters(page=1) {
      const yearInput = document.getElementById("yearFilter").value.trim();
      const sort = document.getElementById("sortFilter").value;
      
      let working = [...allResults];
      
      // Format filter
      if (activeFormat !== "all") {
        working = working.filter(r => r.format === activeFormat);
      }
      
      // Genres filter (AND logic)
      if (activeGenres.length > 0) {
        working = working.filter(r => {
          if (!r.genres || r.genres.length === 0) return false;
          return activeGenres.every(genre => r.genres.includes(genre));
        });
      }
      
      // Year filter
      if (yearInput && !isNaN(parseInt(yearInput))) {
        const targetYear = parseInt(yearInput);
        working = working.filter(r => {
          const year = r.startDate?.year;
          return year && year === targetYear;
        });
      }
      
      // Sorting
      if (sort === "date") {
        working.sort((a, b) => (b.startDate?.year || 0) - (a.startDate?.year || 0));
      } else if (sort === "rating") {
        working.sort((a, b) => (b.averageScore || 0) - (a.averageScore || 0));
      } else if (sort === "title") {
        working.sort((a, b) => {
          const titleA = (a.title?.romaji || a.title?.english || "").toLowerCase();
          const titleB = (b.title?.romaji || b.title?.english || "").toLowerCase();
          return titleA.localeCompare(titleB);
        });
      }
      
      filteredResults = working;
      document.getElementById("resultCount").innerHTML = `${filteredResults.length} <span class="text-gray-400 text-xs">(filtered from ${allResults.length})</span>`;
      renderResults(page);
    }
    
    function renderResults(page) {
      currentPage = page;
      const start = (page - 1) * pageSizeDisplay;
      const end = start + pageSizeDisplay;
      const pageResults = filteredResults.slice(start, end);
      const grid = document.getElementById("resultsGrid");
      
      if (filteredResults.length === 0) {
        grid.innerHTML = '<div class="col-span-full text-center text-gray-400 py-10">No anime match the selected filters. Try adjusting your criteria.</div>';
        document.getElementById("pagination").style.display = "none";
        return;
      }
      
      grid.innerHTML = pageResults.map(r => {
        const title = r.title?.english || r.title?.romaji || "Untitled";
        const poster = r.coverImage?.large || FALLBACK_POSTER;
        const year = r.startDate?.year || "—";
        const rating = r.averageScore ? (r.averageScore / 10).toFixed(1) : "—";
        const status = r.status ? r.status.toLowerCase().replace(/_/g, " ") : "";
        const epCount = r.episodes ? `${r.episodes} eps` : "";
        const format = r.format || "";
        
        return `
          <a href="info.html?id=${r.id}" class="bg-[#1a1a1a] rounded-xl overflow-hidden hover:scale-105 transition block group">
            <div class="relative">
              <img src="${poster}" class="w-full h-72 object-cover" alt="${title}" loading="lazy" onerror="this.src='${FALLBACK_POSTER}'">
            </div>
            <div class="p-2">
              <h3 class="text-sm font-semibold text-white line-clamp-1 group-hover:text-[--accent] transition">${escapeHtml(title)}</h3>
              <p class="text-xs text-gray-400">
                ${format} | ${year} | ${status} ${epCount ? `| ${epCount}` : ""} | <i class="fa fa-star star"></i> ${rating}
              </p>
            </div>
          </a>
        `;
      }).join("");
      
      const totalPages = Math.ceil(filteredResults.length / pageSizeDisplay);
      const paginationDiv = document.getElementById("pagination");
      if (totalPages > 1) {
        paginationDiv.style.display = "flex";
        document.getElementById("pageInfo").innerText = `Page ${page} of ${totalPages}`;
      } else {
        paginationDiv.style.display = "none";
      }
      
      const prevBtn = document.getElementById("prevPage");
      const nextBtn = document.getElementById("nextPage");
      if (prevBtn) prevBtn.disabled = page <= 1;
      if (nextBtn) nextBtn.disabled = page >= totalPages;
      
      // Scroll to top smoothly on page change
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    function escapeHtml(str) {
      if (!str) return "";
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
    
    // Scroll to top button visibility
    window.addEventListener('scroll', () => {
      const scrollBtn = document.getElementById('scrollTop');
      if (window.scrollY > 300) {
        scrollBtn.classList.add('visible');
      } else {
        scrollBtn.classList.remove('visible');
      }
    });
    
    // Event listeners
    document.getElementById("prevPage").addEventListener("click", () => {
      if (currentPage > 1) renderResults(currentPage - 1);
    });
    document.getElementById("nextPage").addEventListener("click", () => {
      const totalPages = Math.ceil(filteredResults.length / pageSizeDisplay);
      if (currentPage < totalPages) renderResults(currentPage + 1);
    });
    
    document.querySelectorAll("#formatFilters .chip").forEach(chip => {
      chip.addEventListener("click", () => {
        document.querySelectorAll("#formatFilters .chip").forEach(c => c.classList.remove("active"));
        chip.classList.add("active");
        activeFormat = chip.dataset.format;
        applyFilters(1);
      });
    });
    
    let yearDebounceTimer;
    document.getElementById("yearFilter").addEventListener("input", (e) => {
      clearTimeout(yearDebounceTimer);
      yearDebounceTimer = setTimeout(() => applyFilters(1), 400);
    });
    
    document.getElementById("sortFilter").addEventListener("change", () => applyFilters(1));
    
    document.getElementById("adultToggle").addEventListener("change", (e) => {
      includeAdult = e.target.checked;
      if (currentQuery !== undefined) {
        fetchAllResults(currentQuery);
      } else {
        fetchAllResults("");
      }
    });
    
    document.getElementById("searchBtn").addEventListener("click", () => {
      const query = document.getElementById("searchInput").value;
      currentQuery = query;
      const params = new URLSearchParams();
      if (query && query.trim() !== "") {
        params.set("q", query);
      }
      const newUrl = window.location.pathname + (params.toString() ? "?" + params.toString() : "");
      window.history.replaceState({}, "", newUrl);
      fetchAllResults(query);
    });
    
    document.getElementById("searchInput").addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        document.getElementById("searchBtn").click();
      }
    });
    
    // Initialize
    function initialize() {
      const urlParams = new URLSearchParams(window.location.search);
      const queryParam = urlParams.get("q");
      
      if (queryParam !== null && queryParam !== undefined) {
        document.getElementById("searchInput").value = queryParam;
        currentQuery = queryParam;
        fetchAllResults(queryParam);
      } else {
        currentQuery = "";
        document.getElementById("searchInput").value = "";
        fetchAllResults("");
      }
    }
    
    initialize();
  </script>
</body>
</html>
