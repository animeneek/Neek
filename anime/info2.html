<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Neek — Anime Info</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --accent: #ff4444;
      --bg: #0b0b0b;
      --muted: #9b9b9b;
    }
    html, body { background: var(--bg); color: #fff; overflow-x: hidden; }
    a { color: #fff; text-decoration: none !important; }
    a:hover { color: var(--accent); }
    .star { color: var(--accent); }
    .ep-btn.active { background: var(--accent); color: #fff; }
    .source-btn.active { background: var(--accent); color: #fff; }
  </style>
</head>

<body class="min-h-screen flex flex-col bg-[--bg] text-white">

<div id="header"></div>

<main class="flex-1 max-w-6xl w-full mx-auto px-3 sm:px-6 py-6 md:pt-28 pb-24">

<section id="info" class="flex flex-col md:flex-row gap-6 items-start"></section>

<section id="watch" class="mt-8">

<h2 class="text-2xl font-bold mb-4 flex items-center gap-2">
<i class="fa fa-play-circle text-[--accent]"></i> Watch Now
</h2>

<div id="player" class="w-full aspect-video bg-black rounded-xl flex items-center justify-center text-gray-400">
Select episode
</div>

<div class="mt-6 bg-[#111] rounded-2xl p-6">

<!-- dropdown (UNCHANGED) -->
<select id="episodeDropdown" class="bg-black border px-3 py-2 mb-4"></select>

<!-- GRID EPISODES -->
<div id="episodes" class="grid grid-cols-5 sm:grid-cols-8 md:grid-cols-10 gap-2"></div>

<!-- PAGINATION -->
<div class="flex justify-between mt-4">
  <button id="prevPage" class="px-4 py-2 bg-[#222] rounded">Prev</button>
  <div id="pageInfo" class="text-sm text-gray-400"></div>
  <button id="nextPage" class="px-4 py-2 bg-[#222] rounded">Next</button>
</div>

<!-- SOURCES -->
<div class="mt-6 flex gap-2" id="sources"></div>

</div>
</section>

</main>

<div id="footer"></div>

<script>
const id = new URLSearchParams(location.search).get("id");
const ANILIST_API = "https://graphql.anilist.co";

let malId;
let totalEpisodes = 0;
let currentEpisode = null;

// pagination state
let currentPage = 0;
const perPage = 100;

const query = `
query($id:Int){
Media(id:$id,type:ANIME){
idMal title{romaji english}
episodes
averageScore
status
nextAiringEpisode { episode timeUntilAiring }
}
}`;

async function fetchAnime(){
const res = await fetch(ANILIST_API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({query,variables:{id:Number(id)}})
});
const json = await res.json();
render(json.data.Media);
}

function calcEpisodes(media){
if(media.status==="NOT_YET_RELEASED") return 0;
if(media.status==="RELEASING"){
return (media.nextAiringEpisode?.episode || 1) - 1;
}
return media.episodes || 0;
}

function renderEpisodes(){
const box = document.getElementById("episodes");
box.innerHTML="";

const start = currentPage * perPage + 1;
const end = Math.min(start + perPage - 1, totalEpisodes);

for(let i=start;i<=end;i++){
const b=document.createElement("button");
b.className="ep-btn px-2 py-1 bg-[#222] rounded text-sm";
b.textContent=i;
b.onclick=()=>selectEpisode(i);
box.appendChild(b);
}

document.getElementById("pageInfo").textContent =
`Episodes ${start}-${end} / ${totalEpisodes}`;

document.getElementById("prevPage").onclick=()=>{
if(currentPage>0){
currentPage--;
renderEpisodes();
}
};

document.getElementById("nextPage").onclick=()=>{
if((currentPage+1)*perPage < totalEpisodes){
currentPage++;
renderEpisodes();
}
};
}

function selectEpisode(ep){
currentEpisode=ep;

document.querySelectorAll(".ep-btn").forEach(b=>{
b.classList.toggle("active",Number(b.textContent)===Number(ep));
});

document.getElementById("episodeDropdown").value=ep;

renderSources();
}

function renderSources(){
const box=document.getElementById("sources");
box.innerHTML="";

["sub","dub"].forEach(s=>{
const b=document.createElement("button");
b.textContent=s.toUpperCase();
b.className="source-btn px-3 py-1 border rounded";

b.onclick=()=>{
document.querySelectorAll(".source-btn").forEach(x=>x.classList.remove("active"));
b.classList.add("active");

document.getElementById("player").innerHTML=
`<iframe class="w-full h-full" src="https://megaplay.buzz/stream/mal/${malId}/${currentEpisode}/${s}"></iframe>`;
};

box.appendChild(b);
});
}

function render(media){

malId=media.idMal;
totalEpisodes=calcEpisodes(media);

document.getElementById("info").innerHTML=`
<div class="md:w-64">
<h1 class="text-2xl font-bold">${media.title.romaji}</h1>
<p>Episodes: ${media.episodes || "?"}</p>
</div>
`;

document.getElementById("episodeDropdown").innerHTML=
Array.from({length:totalEpisodes},(_,i)=>`<option value="${i+1}">Ep ${i+1}</option>`).join("");

document.getElementById("episodeDropdown").onchange=(e)=>selectEpisode(e.target.value);

renderEpisodes();
renderSources();
}

fetchAnime();
</script>

</body>
</html>
