<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funny Puzzle 😜</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body{
    background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
  }
</style>
</head>

<body class="flex items-center justify-center min-h-screen font-sans">

<div class="bg-white shadow-2xl rounded-2xl p-8 max-w-md text-center">

<h1 class="text-3xl font-bold mb-4 text-pink-600">
🧩 Funny Puzzle Challenge
</h1>

<p class="text-gray-600 mb-4">
Solve the puzzle to unlock a secret 💌
</p>

<div id="puzzle" class="text-2xl font-semibold mb-4"></div>

<input id="answer" type="number"
class="border rounded-lg p-2 w-full text-center mb-4"
placeholder="Your answer 🤔">

<button onclick="checkAnswer()"
class="bg-pink-500 hover:bg-pink-600 text-white px-4 py-2 rounded-lg w-full transition">
Check Answer
</button>

<p id="result" class="mt-4 font-semibold"></p>

<button onclick="newPuzzle()"
class="mt-4 text-sm text-blue-500 underline">
New Puzzle 🔄
</button>

</div>

<script>

let num1, num2, correct;

function newPuzzle(){

const ops = ["+","-","*"];

num1 = Math.floor(Math.random()*20)+1;
num2 = Math.floor(Math.random()*20)+1;

const op = ops[Math.floor(Math.random()*ops.length)];

if(op==="+") correct = num1 + num2;
if(op==="-" ) correct = num1 - num2;
if(op==="*") correct = num1 * num2;

document.getElementById("puzzle").innerText = `${num1} ${op} ${num2} = ?`;
document.getElementById("answer").value = "";
document.getElementById("result").innerText = "";

}

function checkAnswer(){

const user = Number(document.getElementById("answer").value);

if(user === correct){

document.getElementById("result").innerHTML =
"🎉 Correct!!! <br><span class='text-2xl text-red-500 font-bold'>I LOVE YOU ANJU ❤️</span>";

confetti();

}else{

document.getElementById("result").innerText = "❌ Wrong! Try again 😜";

}

}

function confetti(){

for(let i=0;i<30;i++){

const div=document.createElement("div");

div.innerText="💖";

div.style.position="fixed";
div.style.left=Math.random()*100+"%";
div.style.top="-20px";
div.style.fontSize="24px";
div.style.animation="fall 3s linear";

document.body.appendChild(div);

setTimeout(()=>div.remove(),3000);

}

}

const style=document.createElement('style');
style.innerHTML=`
@keyframes fall{
0%{transform:translateY(0)}
100%{transform:translateY(100vh)}
}`;
document.head.appendChild(style);

newPuzzle();

</script>

</body>
</html>
