<footer class="w-full bg-[#0b0b0b] border-t border-gray-800 py-6 mt-10">
  <div class="max-w-6xl mx-auto px-4 text-center">

    <!-- Quote -->
    <p id="quoteText" class="text-sm sm:text-base text-gray-300 italic mb-2">
      Loading dialogue...
    </p>

    <!-- Movie name -->
    <p id="quoteMovie" class="text-xs text-gray-500"></p>

    <!-- Copyright -->
    <p class="text-xs text-gray-600 mt-4">
      © 2026 Neek. All rights reserved.
    </p>

  </div>

  <script>
    const quotes = [

      // English
      { text: "Why so serious?", movie: "The Dark Knight" },
      { text: "I am Iron Man.", movie: "Iron Man" },
      { text: "May the Force be with you.", movie: "Star Wars" },
      { text: "I'll be back.", movie: "The Terminator" },

      // Hindi
      { text: "Mogambo khush hua.", movie: "Mr. India" },
      { text: "Kitne aadmi the?", movie: "Sholay" },
      { text: "Picture abhi baaki hai mere dost.", movie: "Om Shanti Om" },

      // Telugu
      { text: "Nenu okkadine vachanu… okkadine pothanu.", movie: "Pokiri" },
      { text: "Cheppanu brother.", movie: "Sarileru Neekevvaru" },

      // Tamil
      { text: "En vazhi, thani vazhi.", movie: "Padayappa" },
      { text: "I am waiting.", movie: "Sivaji" },

      // Malayalam
      { text: "Njan oru thavana paranjaal, nooru thavana paranja pole aanu.", movie: "Rajavinte Makan" },

      // Kannada
      { text: "If you think you are bad, I am your dad.", movie: "KGF" },

    ];

    function setRandomQuote() {
      const q = quotes[Math.floor(Math.random() * quotes.length)];
      document.getElementById('quoteText').textContent = `"${q.text}"`;
      document.getElementById('quoteMovie').textContent = `— ${q.movie}`;
    }

    setRandomQuote();
  </script>
</footer>
